        <h1>Contact</h1>
        <p>Vertel kort wat je zoekt. We reageren met een passend voorstel.</p>

        </ul>

      <section class="card">
        <h2>Stuur een bericht</h2>
        <form id="contact-form" novalidate>
          <label>Naam
            <input type="text" name="name" required />
          </label>
          <label>Email
            <input type="email" name="email" required />
          </label>
          <label>Bericht
            <textarea name="message" rows="6" required></textarea>
          </label>
          <label class="captcha-row">Captcha: <span id="captcha-question"></span>
            <input type="number" name="captcha" id="captcha-answer" required />
          </label>
          <input type="text" name="website" id="website" tabindex="-1" autocomplete="off" class="hp" />
          <button type="submit" class="cta">Verstuur</button>
          <p id="form-status" class="form-status" aria-live="polite"></p>
        </form>
